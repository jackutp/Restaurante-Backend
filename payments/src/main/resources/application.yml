spring:
  profiles:
    default: local
  application:
    name: microservice-payments
  datasource:
    url: jdbc:mysql://localhost:3306/restaurante?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
      database-platform: org.hibernate.dialect.MySQLDialect

  server:
    port: 8080