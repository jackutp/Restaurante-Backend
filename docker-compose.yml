      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka-server:8761/eureka

      EVENTOS_WRITE_DB: eventos-write-db:5432
      EVENTOS_READ_DB: eventos-read-db:5432

      USERNAME_WRITE_DB: postgres
      PASSWORD_WRITE_DB: postgres
      USERNAME_READ_DB: postgres
      PASSWORD_READ_DB: postgres
