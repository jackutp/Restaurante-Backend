version: "3.9"
services:
  # =====================================================
  # EUREKA SERVER
  # =====================================================
  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker
  # =====================================================
  # GATEWAY SERVER
  # =====================================================
  gateway-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: Gateway-Server
    container_name: gateway-server
    ports:
      - "8090:8090"
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka-server:8761/eureka
      FRONTEND_URL: http://localhost:4200
      SECRET: mysecretkey
    depends_on:
      - eureka-server

  # =====================================================
  # COCINA
  # =====================================================
  microservicio-cocina:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODULE: microservicio-cocina
    container_name: microservicio-cocina
    ports:
      - "8218:8218"
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URL: http://eureka-server:8761/eureka

      COCINA_WRITE_DB: cocina-write-db:5432
      COCINA_READ_DB: cocina-read-db:5432

      USERNAME_WRITE_DB: postgres
      PASSWORD_WRITE_DB: postgres
      USERNAME_READ_DB: postgres
      PASSWORD_READ_DB: postgres
    depends_on:
      - eureka-server
      - cocina-write-db
      - cocina-read-db
  # =====================================================
  # EVENTOS
  # =====================================================
  microservicio-eventos:
