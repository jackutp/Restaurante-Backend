spring:
  datasource:
    write:
      jdbc-url: jdbc:postgresql://${EVENTOS_WRITE_DB}/eventos_db
      username: ${USERNAME_WRITE_DB}
      password: ${PASSWORD_WRITE_DB}
      driver-class-name: org.postgresql.Driver
    read:
      jdbc-url: jdbc:postgresql://${EVENTOS_READ_DB}/eventos_db
      username: ${USERNAME_READ_DB}
      password: ${PASSWORD_READ_DB}
      driver-class-name: org.postgresql.Driver
    # Configuracion de Eureka (Service Discovery)