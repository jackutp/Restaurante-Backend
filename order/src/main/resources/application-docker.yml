spring:
  datasource:
    write:
      url: jdbc:mysql://${ORDER_WRITE_DB}/restaurante?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${USERNAME_WRITE_DB}
      password: ${PASSWORD_WRITE_DB}
      driver-class-name: com.mysql.cj.jdbc.Driver
    read:
      url: jdbc:mysql://${ORDER_READ_DB}/restaurante?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      username: ${USERNAME_READ_DB}
      password: ${PASSWORD_READ_DB}
      driver-class-name: com.mysql.cj.jdbc.Driver
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
  instance:
    prefer-ip-address: true
