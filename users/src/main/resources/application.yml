server:
  port: 8080
spring:
  profiles:
    default: local
  application:
    name: microservice-user
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        database-platform: org.hibernate.dialect.MySQLDialect
    sql:
      init:
        mode: always