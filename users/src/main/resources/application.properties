spring.application.name=microservicio-users
server.port=8220
server.servlet.context-path=/
# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/users_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Eureka
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
# JWT Config (opcional, puedes dejarlo en el c¾digo)
# jwt.secret=${JWT_SECRET:3KTMZ7An77+TnowBQVy0+Nop3ADuwmIIbcTszYkOAYY=}
# jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.service.user=DEBUG
logging.level.org.springframework.security=DEBUG