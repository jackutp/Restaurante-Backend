# PostgreSQL
spring.datasource.write.jdbc-url=jdbc:postgresql://${PAGOS_WRITE_DB}/pagos_db
spring.datasource.write.username=${USERNAME_WRITE_DB}
spring.datasource.write.password=${PASSWORD_WRITE_DB}
spring.datasource.write.driver-class-name=org.postgresql.Driver

spring.datasource.read.jdbc-url=jdbc:postgresql://${PAGOS_READ_DB}/pagos_db
spring.datasource.read.username=${USERNAME_READ_DB}
spring.datasource.read.password=${PASSWORD_READ_DB}
spring.datasource.read.driver-class-name=org.postgresql.Driver

pdf.storage.path=./pdfs/

aws.access-key=${ACCESS_KEY}
aws.secret-key=${SECRET_KEY}
aws.region=us-east-1
aws.s3.bucket=${BUCKET}
