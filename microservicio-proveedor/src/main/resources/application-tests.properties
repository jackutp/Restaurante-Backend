# Configuracion PostgreSQL
spring.datasource.write.jdbc-url=jdbc:postgresql://localhost:5432/proveedores_db
spring.datasource.write.username=postgres
spring.datasource.write.password=password
spring.datasource.write.driver-class-name=org.postgresql.Driver
#spring.datasource.read.jdbc-url=jdbc:postgresql://localhost:5432/proveedores_db
spring.datasource.read.jdbc-url=jdbc:postgresql://localhost:5433/proveedores_db
spring.datasource.read.username=postgres
spring.datasource.read.password=password
spring.datasource.read.driver-class-name=org.postgresql.Driver
# Logging
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
eureka.client.enabled=false
spring.cloud.discovery.enabled=false
