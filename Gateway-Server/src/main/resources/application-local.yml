spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origin-patterns:
                  - "http://localhost:3000"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowed-headers:
                  - Content-Type
                  - Authorization
                  - X-Requested-With
                  - Accept
                  - Origin
                allow-credentials: true
                max-age: 3600
          routes:
            - id: microservicio-insumos
              uri: lb://microservicio-insumos
              predicates:
                - Path=/api/insumos/**
              filters:
                - StripPrefix=1
            - id: microservicio-producto
              uri: lb://microservicio-producto
              predicates:
                - Path=/api/productos/**
              filters:
                - StripPrefix=1
            - id: microservicio-proveedor
              uri: lb://microservicio-proveedor
              predicates:
                - Path=/api/proveedores/**
              filters:
                - StripPrefix=1
            - id: microservicio-mermas
              uri: lb://microservicio-mermas
              predicates:
                - Path=/api/mermas/**
              filters:
                - StripPrefix=1
            - id: microservicio-eventos
              uri: lb://microservicio-eventos
              predicates:
                - Path=/api/eventos/**
              filters:
                - StripPrefix=1
            - id: microservicio-mesas
              uri: lb://microservicio-mesas
              predicates:
                - Path=/api/mesas/**
              filters:
                - StripPrefix=1
            - id: microservicio-pedidos
              uri: lb://microservicio-pedidos
              predicates:
                - Path=/api/pedidos/**
              filters:
                - StripPrefix=1
            - id: microservicio-cocina
              uri: lb://microservicio-cocina
              predicates:
                - Path=/api/cocina/**
              filters:
                - StripPrefix=1
            - id: microservicio-pagos
              uri: lb://microservicio-pagos
              predicates:
                - Path=/api/pagos/**
              filters:
                - StripPrefix=1
            - id: microservicio-users
              uri: lb://microservicio-users
              predicates:
                - Path=/api/usuarios/**
              filters:
                - StripPrefix=1
            - id: microservicio-reservas
              uri: lb://microservicio-reservas
              predicates:
                - Path=/api/reservas/**
              filters:
                - StripPrefix=1
            - id: microservicio-solicitudes
              uri: lb://microservicio-solicitudes
              predicates:
                - Path=/api/solicitudes/**
              filters:
                - StripPrefix=1