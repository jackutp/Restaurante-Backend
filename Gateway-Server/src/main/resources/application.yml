logging:
  level:
    org.springframework.cloud.gateway: TRACE
server:
  port: 8090
spring:
  application:
    name: Gateway-Server
  profiles:
    default: local
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}